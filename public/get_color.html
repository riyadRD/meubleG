<!DOCTYPE html>
<html>
<body>
<img id="img" src="/gazameuble-logo.png" onload="process()" style="display:none;"/>
<div id="output"></div>
<script>
function process() {
  const img = document.getElementById('img');
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  const counts = {};
  for (let i = 0; i < data.length; i += 40) { // skip some to be faster
    if (data[i+3] < 128) continue; // skip transparent
    // bucket colors roughly to find dominant ones
    const r = Math.round(data[i] / 10) * 10;
    const g = Math.round(data[i+1] / 10) * 10;
    const b = Math.round(data[i+2] / 10) * 10;
    const rgb = `${r},${g},${b}`;
    counts[rgb] = (counts[rgb] || 0) + 1;
  }
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 10);
  document.getElementById('output').innerText = JSON.stringify(sorted);
}
</script>
</body>
</html>
